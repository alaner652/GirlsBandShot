services:
  web:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./web/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_BASE=./data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web
    restart: unless-stopped
