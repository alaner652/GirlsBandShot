services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # 掛載 data 目錄（包含 DB 和影片）
      - ./web/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_BASE=./data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
